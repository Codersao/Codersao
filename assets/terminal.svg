<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .term-bg { fill: #0d1117; }
      .title-bar { fill: #161b22; }
      .dot-r { fill: #ff5f57; }
      .dot-y { fill: #febc2e; }
      .dot-g { fill: #28c840; }
      .prompt { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: #00cc66; }
      .cmd { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: #e6edf3; }
      .out { font-family: 'JetBrains Mono', monospace; font-size: 12px; fill: #00ff88; }
      .dim { fill: #666; }
      .cursor-blink { fill: #00ff88; animation: blink 1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .fade-in-1 { animation: fadeIn 0.5s ease forwards; animation-delay: 0.2s; opacity: 0; }
      .fade-in-2 { animation: fadeIn 0.5s ease forwards; animation-delay: 0.8s; opacity: 0; }
      .fade-in-3 { animation: fadeIn 0.5s ease forwards; animation-delay: 1.4s; opacity: 0; }
      .fade-in-4 { animation: fadeIn 0.5s ease forwards; animation-delay: 2.0s; opacity: 0; }
      .fade-in-5 { animation: fadeIn 0.5s ease forwards; animation-delay: 2.6s; opacity: 0; }
      @keyframes fadeIn { to { opacity: 1; } }
    </style>
  </defs>
  
  <!-- Terminal Window -->
  <rect class="term-bg" width="800" height="200" rx="12"/>
  <rect class="title-bar" x="0" y="0" width="800" height="32" rx="12"/>
  <rect class="title-bar" x="0" y="20" width="800" height="12"/>
  
  <!-- Window Dots -->
  <circle class="dot-r" cx="20" cy="16" r="6"/>
  <circle class="dot-y" cx="40" cy="16" r="6"/>
  <circle class="dot-g" cx="60" cy="16" r="6"/>
  
  <!-- Title Bar Text -->
  <text x="400" y="21" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#8b949e">jatin@ai-engineer — bash</text>
  
  <!-- Line 1 -->
  <g class="fade-in-1">
    <text x="20" y="62" class="prompt">jatin@ai</text>
    <text x="90" y="62" class="dim" font-family="'JetBrains Mono', monospace" font-size="13">:</text>
    <text x="98" y="62" font-family="'JetBrains Mono', monospace" font-size="13" fill="#4488ff">~/github</text>
    <text x="168" y="62" class="dim" font-family="'JetBrains Mono', monospace" font-size="13">$</text>
    <text x="184" y="62" class="cmd">cat about_me.txt</text>
  </g>
  
  <!-- Output -->
  <g class="fade-in-2">
    <text x="20" y="85" class="out">🎓 B.Tech CSE @ Central University of Punjab (2024–2028)</text>
  </g>
  
  <g class="fade-in-3">
    <text x="20" y="105" class="out">🤖 Specializing in: AI • ML • CV • Robotics • Full Stack</text>
  </g>
  
  <!-- Line 2 -->
  <g class="fade-in-4">
    <text x="20" y="132" class="prompt">jatin@ai</text>
    <text x="90" y="132" class="dim" font-family="'JetBrains Mono', monospace" font-size="13">:</text>
    <text x="98" y="132" font-family="'JetBrains Mono', monospace" font-size="13" fill="#4488ff">~/github</text>
    <text x="168" y="132" class="dim" font-family="'JetBrains Mono', monospace" font-size="13">$</text>
    <text x="184" y="132" class="cmd">echo $MOTTO</text>
  </g>
  
  <g class="fade-in-5">
    <text x="20" y="155" class="out">"Building intelligent systems that solve real-world problems."</text>
  </g>
  
  <!-- Cursor on last line -->
  <g class="fade-in-5">
    <text x="20" y="178" class="prompt">jatin@ai</text>
    <text x="90" y="178" class="dim" font-family="'JetBrains Mono', monospace" font-size="13">:</text>
    <text x="98" y="178" font-family="'JetBrains Mono', monospace" font-size="13" fill="#4488ff">~/github</text>
    <text x="168" y="178" class="dim" font-family="'JetBrains Mono', monospace" font-size="13">$</text>
    <rect x="184" y="163" width="10" height="18" class="cursor-blink" rx="2"/>
  </g>
</svg>
