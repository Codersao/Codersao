<svg xmlns="http://www.w3.org/2000/svg" width="800" height="60">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .bg { fill: #0d1117; }
      .text { 
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-size: 22px;
        font-weight: 700;
        fill: #00ff88;
        letter-spacing: 1px;
      }
      .cursor {
        fill: #00ff88;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </defs>
  <rect class="bg" width="800" height="60" rx="8"/>
  
  <!-- Prompt prefix -->
  <text x="20" y="38" class="text" fill="#00cc66">jatin@ai</text>
  <text x="115" y="38" class="text" fill="#666">:</text>
  <text x="125" y="38" class="text" fill="#4488ff">~/github</text>
  <text x="220" y="38" class="text" fill="#666">$</text>
  
  <!-- Animated typing text -->
  <text x="245" y="38" class="text">
    <tspan>
      AI Engineer | Data Scientist | Full Stack Dev
      <animate attributeName="opacity" values="0;0;1;1;1;1;0;0" dur="8s" repeatCount="indefinite" begin="0s"/>
    </tspan>
  </text>
  
  <!-- Cursor -->
  <rect x="248" y="20" width="12" height="22" class="cursor" rx="2">
    <animate attributeName="x" values="248;640;248" dur="8s" repeatCount="indefinite" calcMode="discrete" keyTimes="0;0.5;1"/>
  </rect>
</svg>
